<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RealSTEM — Dashboard</title>
  <meta name="description" content="Generate AI-powered STEM lessons from real-world news headlines." />
  <meta name="theme-color" content="#06090f" />
  <link rel="icon" type="image/png" href="/assets/logo.png" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>

  <div class="dashboard-page">
    <!-- Background Ambience -->
    <div class="bg-grid"></div>
    <div class="ambient-orb" style="width:450px;height:450px;background:rgba(59,130,246,0.1);top:-5%;right:-5%;"></div>
    <div class="ambient-orb" style="width:350px;height:350px;background:rgba(139,92,246,0.08);bottom:10%;left:-5%;"></div>

    <!-- Dashboard Header -->
    <header class="dash-header">
      <div class="container dash-header-inner">
        <a href="/" class="logo-link">
          <img src="/assets/logo.png" alt="RealSTEM" class="logo-img" />
          <span class="logo-text">RealSTEM</span>
        </a>
        <div class="dash-user">
          <span style="color:var(--text-secondary);font-size:0.88rem;" id="dashGreeting">Teacher Portal</span>
          <div class="dash-avatar" id="dashAvatar">T</div>
        </div>
      </div>
    </header>

    <!-- Dashboard Content -->
    <div class="container dash-content">
      <div class="dash-welcome">
        <h1>Lesson <span class="text-gradient">Generator</span></h1>
        <p>Enter a current event headline and generate a standards-aligned STEM lesson in seconds.</p>
      </div>

      <div class="generator-wrap">
        <!-- Form Panel -->
        <div class="gen-form-card glass-strong">
          <h3>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent-blue)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
            Generate Lesson
          </h3>
          <form class="gen-form" id="lessonForm">
            <div class="form-group">
              <label class="form-label" for="headline">News Headline</label>
              <input class="form-input" type="text" id="headline" placeholder="Paste a current news story..." value="Tesla recalls 2M cars after autopilot issue" />
            </div>

            <div class="gen-field-row">
              <div class="form-group">
                <label class="form-label" for="locale">Locale</label>
                <select class="gen-select" id="locale">
                  <option value="India">India</option>
                  <option value="US">US</option>
                  <option value="Global">Global</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label" for="gradeLevel">Grade Band</label>
                <select class="gen-select" id="gradeLevel">
                  <option value="Middle School">Middle School</option>
                  <option value="High School" selected>High School</option>
                </select>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label" for="subject">Subject Focus</label>
              <select class="gen-select" id="subject">
                <option value="Physics">Physics</option>
                <option value="Chemistry">Chemistry</option>
                <option value="Biology">Biology</option>
                <option value="Mathematics">Mathematics</option>
                <option value="Computer Science" selected>Computer Science</option>
                <option value="Earth Science">Earth Science</option>
              </select>
            </div>

            <div class="form-group">
              <label class="form-label">Try an example</label>
              <div class="gen-examples" id="exampleChips">
                <button type="button" class="gen-example-chip" data-headline="Tesla recalls 2M cars after autopilot issue">Tesla autopilot recall</button>
                <button type="button" class="gen-example-chip" data-headline="India's Chandrayaan-3 lands on the Moon">Chandrayaan-3 landing</button>
                <button type="button" class="gen-example-chip" data-headline="New city project cuts carbon emissions with smart sensors">Smart city emissions</button>
              </div>
            </div>

            <button type="submit" class="gen-submit" id="genSubmit">
              Generate AI Lesson
            </button>
            <p class="gen-error" id="genError" style="display:none;"></p>
          </form>
        </div>

        <!-- Output Panel -->
        <div class="gen-output-card glass-strong" id="outputPanel">
          <h3>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent-blue)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
            Teacher Review Portal
          </h3>
          <div id="outputContent">
            <div class="output-empty">
              <div class="output-empty-icon">⚡</div>
              <h4>Awaiting Generation</h4>
              <p>Generated lesson structures, standards, and activities will appear here for review.</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/dashboard.js"></script>
</body>
</html>
